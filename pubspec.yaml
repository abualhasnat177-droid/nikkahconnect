name: nikah_connect
description: Nikah Connect - Islamic Marriage & Rishta Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  go_router: ^13.0.0
  flutter_riverpod: ^2.5.0
  dio: ^5.4.0
  retrofit: ^4.1.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.0.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  lottie: ^3.1.0
  image_picker: ^1.1.0
  image_cropper: ^7.0.0
  video_player: ^2.8.0
  flutter_stripe: ^10.1.0
  in_app_purchase: ^3.1.13
  intl: ^0.20.2
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  retrofit_generator: ^8.1.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/lottie/


