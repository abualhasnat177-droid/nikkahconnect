workflows:
  android-build:
    name: Android Build
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    cache:
      cache_paths:
        - ~/.pub-cache
    scripts:
      - name: Build debug APK
        script: |
          flutter clean
          flutter pub get
          flutter build apk --debug --android-skip-build-dependency-validation
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - muhammadhasnatctn@gmail.com
        notify:
          success: true
          failure: true
