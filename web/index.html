<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nikah Connect - Islamic Marriage & Rishta Platform">
  <meta name="keywords" content="nikah, rishta, islamic marriage, halal, matrimony, pakistan">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A5C38">

  <title>Nikah Connect</title>

  <link rel="manifest" href="/manifest.json">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #F8F6F0;
      font-family: 'Nunito Sans', -apple-system, sans-serif;
    }
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
      color: #1A5C38;
    }
    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #D6EFE1;
      border-top-color: #1A5C38;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div style="font-size: 18px; font-weight: 600;">Nikah Connect</div>
  </div>

  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function() {
      _flutter.loader.load({
        onEntrypointLoaded: async function(engineInitializer) {
          let appRunner = await engineInitializer.initializeEngine();
          document.getElementById('loading').style.display = 'none';
          await appRunner.runApp();
        }
      });
    });
  </script>
</body>
</html>
